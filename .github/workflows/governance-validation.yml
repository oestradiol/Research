name: Governance Validation

on:
  pull_request:
    paths:
      - 'governance/**'
      - 'CURRENT_SURFACES_REGISTRY_v0_1.json'
      - 'AUTHORITATIVE_INTEGRITY_MANIFEST_v0_1.json'
      - 'SUBSYSTEM_REGISTRY_v0_1.json'
  push:
    branches:
      - main
    paths:
      - 'governance/**'
      - 'CURRENT_SURFACES_REGISTRY_v0_1.json'
      - 'AUTHORITATIVE_INTEGRITY_MANIFEST_v0_1.json'
      - 'SUBSYSTEM_REGISTRY_v0_1.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=github:NixOS/nixpkgs/nixos-unstable

      - name: Cache Nix dependencies
        uses: cachix/cachix-action@v14
        with:
          name: research-tools
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run governance consistency validation
        run: nix develop ./tools -c python tools/src/research_tools/validate/governance_consistency.py

      - name: Run cluster validation
        run: nix develop ./tools -c python tools/src/research_tools/workflows/validate_clusters.py
